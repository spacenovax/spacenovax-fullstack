<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SpaceNovaX Admin</title><style>body{margin:0;background:#050713;color:#eef3ff;font-family:Arial;padding:20px}input,button{padding:12px;border-radius:10px;border:1px solid #334;background:#111735;color:white}button{background:#725cff;font-weight:bold}.card{border:1px solid #27315f;background:#10152e;border-radius:18px;padding:18px;margin:14px 0}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid #222b55;padding:10px 0}.pending{color:#ffd166}.approved{color:#22e8ff}.rejected{color:#ff6b6b}</style></head><body><h1>SpaceNovaX Admin Dashboard</h1><p>SPNX Points · Mission Review · Future Solana settlement</p><input id="key" placeholder="Admin Key"><button onclick="load()">Load Stats</button><div id="out"></div><script>
async function load(){const key=document.getElementById('key').value;const r=await fetch('/api/admin/stats',{headers:{'x-admin-key':key}});const j=await r.json();if(!j.ok){out.innerHTML='Access denied';return;}out.innerHTML=`<div class=card><h2>Total Users: ${j.totalUsers}</h2><h2>Total Mined: ${Number(j.totalMined).toLocaleString()} SPNX</h2><h2>Phase: ${j.phase.name}</h2></div><div class=card><h2>Mission Claims</h2>${j.claims.map(c=>`<div class=row><span>${c.telegram_id} · ${c.mission_id} · <b class="${c.status}">${c.status}</b> · ${c.reward} SPNX</span><span><button onclick="review('${c.id??j.claims.indexOf(c)}','approved')">Approve</button><button onclick="review('${c.id??j.claims.indexOf(c)}','rejected')">Reject</button></span></div>`).join('')}</div><div class=card><h2>Top Users</h2>${j.users.map(u=>`<div class=row><b>${u.username||u.first_name||u.telegram_id}</b><span>${Number(u.balance).toFixed(6)} SPNX</span></div>`).join('')}</div>`}
async function review(id,status){const key=document.getElementById('key').value;await fetch('/api/admin/mission/review',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':key},body:JSON.stringify({claimId:id,status})});load();}
</script></body></html>
