<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SpaceNovaX Admin</title><style>
body{margin:0;background:radial-gradient(circle at top,#111b48,#050713);color:#eef3ff;font-family:Arial;padding:20px}input,button{padding:12px;border-radius:10px;border:1px solid #334;background:#111735;color:white}button{background:#006dff;font-weight:bold}.card{border:1px solid #27315f;background:#10152e;border-radius:18px;padding:18px;margin:14px 0}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid #222b55;padding:10px 0}.pending{color:#ffd166}.approved{color:#22e8ff}.rejected{color:#ff6b6b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.stat{background:#071027;border:1px solid #27315f;border-radius:16px;padding:16px}.stat b{font-size:24px;color:#36ecff}
</style></head><body><h1>SpaceNovaX Admin Dashboard</h1><p>SPNX Points · Mission Review · User Adjustment · Future Solana settlement</p><input id="key" placeholder="Admin Key"><button onclick="load()">Load Dashboard</button><div id="out"></div><script>
async function load(){const key=document.getElementById('key').value;const r=await fetch('/api/admin/stats',{headers:{'x-admin-key':key}});const j=await r.json();if(!j.ok){out.innerHTML='Access denied';return;}out.innerHTML=`<div class=grid><div class=stat>Total Users<br><b>${j.totalUsers}</b></div><div class=stat>Total Mined<br><b>${Number(j.totalMined).toLocaleString()}</b></div><div class=stat>Phase<br><b>${j.phase.name}</b></div></div><div class=card><h2>Adjust User Points</h2><input id=tgid placeholder="Telegram ID"><input id=amount placeholder="Amount e.g. 100 or -100"><button onclick="adjust()">Apply</button></div><div class=card><h2>Mission Claims</h2>${j.claims.map(c=>`<div class=row><span>${c.telegram_id} · ${c.mission_id} · <b class="${c.status}">${c.status}</b> · ${c.reward} SPNX</span><span><button onclick="review('${c.id??j.claims.indexOf(c)}','approved')">Approve</button><button onclick="review('${c.id??j.claims.indexOf(c)}','rejected')">Reject</button></span></div>`).join('')}</div><div class=card><h2>Top Users</h2>${j.users.map(u=>`<div class=row><b>${u.username||u.first_name||u.telegram_id}<br><small>${u.telegram_id}</small></b><span>${Number(u.balance).toFixed(6)} SPNX · Lv.${u.level}</span></div>`).join('')}</div>`}
async function review(id,status){const key=document.getElementById('key').value;await fetch('/api/admin/mission/review',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':key},body:JSON.stringify({claimId:id,status})});load();}
async function adjust(){const key=document.getElementById('key').value;await fetch('/api/admin/user/adjust',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':key},body:JSON.stringify({telegramId:tgid.value,amount:amount.value,reason:'admin'})});load();}
</script></body></html>
